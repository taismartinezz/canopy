<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Save to Canopy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; width: 320px; padding: 16px; background: #F8FAFC; color: #1B2E4B; }
    h1 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
    label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #64748B; display: block; margin-bottom: 3px; }
    input, select, textarea { width: 100%; border: 1px solid #CBD5E1; border-radius: 6px; padding: 6px 9px; font-size: 12px; font-family: inherit; background: #fff; color: #1B2E4B; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: #1B2E4B; }
    textarea { resize: none; min-height: 52px; }
    .field { margin-bottom: 10px; }
    .row { display: flex; gap: 8px; }
    .row .field { flex: 1; }
    button { width: 100%; padding: 9px; border: none; border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer; }
    #save-btn { background: #1B2E4B; color: #fff; margin-top: 4px; }
    #save-btn:disabled { opacity: .5; cursor: default; }
    #status { font-size: 12px; margin-top: 8px; text-align: center; min-height: 18px; }
    #status.ok  { color: #2E7D52; }
    #status.err { color: #C0392B; }
    .settings-link { font-size: 11px; color: #64748B; text-align: right; margin-bottom: 10px; cursor: pointer; text-decoration: underline; }
    #settings-panel { display: none; }
    #settings-panel.open { display: block; }
  </style>
</head>
<body>
  <h1>Save to Canopy</h1>

  <p class="settings-link" id="toggle-settings">Settings</p>
  <div id="settings-panel">
    <div class="field">
      <label>Canopy URL</label>
      <input id="canopy-url" type="url" placeholder="https://your-canopy.vercel.app" />
    </div>
    <div class="field">
      <label>Auth Token</label>
      <input id="auth-token" type="password" placeholder="Paste from Canopy → Profile → API Token" />
    </div>
    <button id="save-settings" style="background:#475569;color:#fff;margin-bottom:12px;">Save settings</button>
  </div>

  <div class="field">
    <label>Title</label>
    <input id="title" type="text" />
  </div>
  <div class="row">
    <div class="field">
      <label>DOI</label>
      <input id="doi" type="text" placeholder="10.xxxx/…" />
    </div>
    <div class="field">
      <label>Year</label>
      <input id="year" type="number" min="1900" max="2099" />
    </div>
  </div>
  <div class="field">
    <label>Authors</label>
    <input id="authors" type="text" placeholder="Comma-separated" />
  </div>
  <div class="field">
    <label>Add to</label>
    <select id="scope">
      <option value="lab">Lab Library</option>
      <option value="my">My Library</option>
      <option value="project">Project Library</option>
    </select>
  </div>

  <button id="save-btn" disabled>Save to Canopy</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
